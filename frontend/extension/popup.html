<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalesWhisper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 400px;
      background: #09090b;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: #2563eb;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    .title { font-weight: 600; font-size: 15px; }
    .status-section { padding: 16px; }
    .status-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #52525b;
      display: inline-block;
      margin-right: 8px;
    }
    .status-dot.active { background: #22c55e; }
    .status-text { font-size: 13px; color: #a1a1aa; }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-danger { background: #27272a; color: #f87171; margin-top: 8px; }
    .suggestions-section {
      padding: 0 16px 16px;
    }
    .suggestion-label {
      font-size: 11px;
      color: #52525b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .suggestion-card {
      background: #18181b;
      border: 1px solid #2563eb44;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      color: #93c5fd;
      line-height: 1.5;
    }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #27272a;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #52525b;
      text-decoration: none;
    }
    .footer a:hover { color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <span class="title">SalesWhisper</span>
  </div>

  <div class="status-section">
    <div class="status-card">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Not listening</span>
    </div>
    <button class="btn btn-primary" id="startBtn">🎙 Start Listening</button>
    <button class="btn btn-danger" id="stopBtn" style="display:none">⏹ Stop</button>
  </div>

  <div class="suggestions-section" id="suggestionsSection" style="display:none">
    <p class="suggestion-label">💡 AI Suggestion</p>
    <div class="suggestion-card" id="suggestionText">
      Listening to your call...
    </div>
  </div>

  <div class="footer">
    <a href="http://localhost:3000/dashboard" target="_blank">Open Dashboard →</a>
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
